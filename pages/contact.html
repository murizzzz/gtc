<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/contact.css">
</head>
<body>
     <header>
        <nav class="navbar">
            <a href="index.html" class="logo">GoldenTech Computer Training College</a>
            <ul class="nav-link">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="courses.html">Our Courses</a></li>
                <li><a href="contact.html" class="active">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="page-banner">
            <h2>Contact Us</h2>
        </div>
        <div class="contact">
            <form class="contact-form">
                <label for="full-name">Full Name:</label>
                    <input type="text" id="full-name" placeholder="Enter your full name" name="full-name" required>
                <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="egabcde@gmail.com">  
                <label for="course">Course:</label>
                    <input type="text" id="course" name="course" placeholder="Enter the course you want to enroll">
                <label for="message">Message: </label>
                    <textarea rows="4" cols="40" id="message" placeholder="More details about you"></textarea>
                <button class="btn-primary">Submit</button>
            </form>
        </div>
    </main>
</body>
</html>
